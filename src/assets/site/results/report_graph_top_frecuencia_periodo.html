<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/dist/vis-network.min.css"
    integrity="sha512-WgxfT5LWjfszlPHXRmBWHkV2eceiWTOBvrKCNbdgDYTHrT2AeLCGbF4sZlZw3UMN3WtL0tGUoIAKsu8mllg/XA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/dist/vis-network.min.js"
    integrity="sha512-LnvoEWDFrqGHlHmDD2101OrLcbsfkrzoSpvtSQtxK3RMnRV0eOkhhBN2dXHKRrUU8p2DGRTk35n4O8nWSVe1mQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      color: #1a2332;
      overflow: hidden;
    }
    .layout { position: relative; height: 680px; }
    .graph-wrap {
      position: absolute; inset: 0;
      background: #ffffff;
    }
    #net_top_frecuencia_periodo { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div class="layout">
    <div class="graph-wrap">
      <div id="net_top_frecuencia_periodo"></div>
    </div>
  </div>

  <script>
  (() => {
    function lerpRGB(a, b, t) {
      return [
        Math.round(a[0] + t * (b[0] - a[0])),
        Math.round(a[1] + t * (b[1] - a[1])),
        Math.round(a[2] + t * (b[2] - a[2])),
      ];
    }
    const CS = [[69,117,180],[255,255,191],[215,48,39]];
    function scoreToCSS(t) {
      t = Math.max(0, Math.min(1, t));
      const rgb = t <= 0.5 ? lerpRGB(CS[0], CS[1], t * 2) : lerpRGB(CS[1], CS[2], (t - 0.5) * 2);
      return `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
    }

    const payload = {"nodes": [{"id": "CNT_TRF", "label": "CNT_TRF", "_score": 1.0, "mode_id": "A", "mode_name": "Evento, impacto e indicadores", "title": "CNT_TRF\nRelevancia: 1.000e+00"}, {"id": "CNT_VN", "label": "CNT_VN", "_score": 0.9265428670892418, "mode_id": "B", "mode_name": "Infraestructura de protección y maniobra", "title": "CNT_VN\nRelevancia: 9.265e-01"}, {"id": "CONDUCTOR", "label": "CONDUCTOR", "_score": 0.0784415180100045, "mode_id": "D", "mode_name": "Características físicas y eléctricas del vano", "title": "CONDUCTOR\nRelevancia: 7.844e-02"}, {"id": "TIPO_TAX", "label": "TIPO_TAX", "_score": 0.06769429448890399, "mode_id": "D", "mode_name": "Características físicas y eléctricas del vano", "title": "TIPO_TAX\nRelevancia: 6.769e-02"}, {"id": "TIPO", "label": "TIPO", "_score": 0.06143920482382852, "mode_id": "B", "mode_name": "Infraestructura de protección y maniobra", "title": "TIPO\nRelevancia: 6.144e-02"}, {"id": "wind_spd_7", "label": "wind_spd_7", "_score": 0.061212895241885744, "mode_id": "F", "mode_name": "Entorno, riesgo y clima", "title": "wind_spd_7\nRelevancia: 6.121e-02"}, {"id": "prep_3", "label": "prep_3", "_score": 0.0386321345631907, "mode_id": "F", "mode_name": "Entorno, riesgo y clima", "title": "prep_3\nRelevancia: 3.863e-02"}, {"id": "wind_spd_9", "label": "wind_spd_9", "_score": 0.029707665704510635, "mode_id": "F", "mode_name": "Entorno, riesgo y clima", "title": "wind_spd_9\nRelevancia: 2.971e-02"}, {"id": "wind_spd_3", "label": "wind_spd_3", "_score": 0.02956907533259551, "mode_id": "F", "mode_name": "Entorno, riesgo y clima", "title": "wind_spd_3\nRelevancia: 2.957e-02"}, {"id": "wind_spd_6", "label": "wind_spd_6", "_score": 0.028716762438735943, "mode_id": "F", "mode_name": "Entorno, riesgo y clima", "title": "wind_spd_6\nRelevancia: 2.872e-02"}, {"id": "temp_4", "label": "temp_4", "_score": 0.01668224874687565, "mode_id": "F", "mode_name": "Entorno, riesgo y clima", "title": "temp_4\nRelevancia: 1.668e-02"}, {"id": "wind_spd_5", "label": "wind_spd_5", "_score": 0.012459073224299648, "mode_id": "F", "mode_name": "Entorno, riesgo y clima", "title": "wind_spd_5\nRelevancia: 1.246e-02"}, {"id": "prep_2", "label": "prep_2", "_score": 0.007131574440230167, "mode_id": "F", "mode_name": "Entorno, riesgo y clima", "title": "prep_2\nRelevancia: 7.132e-03"}, {"id": "prep_4", "label": "prep_4", "_score": 0.005677624159305021, "mode_id": "F", "mode_name": "Entorno, riesgo y clima", "title": "prep_4\nRelevancia: 5.678e-03"}, {"id": "wind_gust_spd_11", "label": "wind_gust_spd_11", "_score": 0.005293296934098292, "mode_id": "F", "mode_name": "Entorno, riesgo y clima", "title": "wind_gust_spd_11\nRelevancia: 5.293e-03"}, {"id": "temp_7", "label": "temp_7", "_score": 0.0047337975796054406, "mode_id": "F", "mode_name": "Entorno, riesgo y clima", "title": "temp_7\nRelevancia: 4.734e-03"}, {"id": "wind_spd_0", "label": "wind_spd_0", "_score": 0.004379830492673058, "mode_id": "F", "mode_name": "Entorno, riesgo y clima", "title": "wind_spd_0\nRelevancia: 4.380e-03"}, {"id": "PROMEDIO_KWH_VANO", "label": "PROMEDIO_KWH_VANO", "_score": 0.002968436188695735, "mode_id": "D", "mode_name": "Características físicas y eléctricas del vano", "title": "PROMEDIO_KWH_VANO\nRelevancia: 2.968e-03"}, {"id": "VAL_CRIT_APOYO", "label": "VAL_CRIT_APOYO", "_score": 0.002829917684546021, "mode_id": "E", "mode_name": "Activos: apoyo final y transformador", "title": "VAL_CRIT_APOYO\nRelevancia: 2.830e-03"}, {"id": "wind_spd_4", "label": "wind_spd_4", "_score": 0.0, "mode_id": "F", "mode_name": "Entorno, riesgo y clima", "title": "wind_spd_4\nRelevancia: 0.000e+00"}], "edges": [{"from": "CNT_VN", "to": "TIPO_TAX", "_norm_w": 1.0, "width": 9.0, "title": "Valor: 4.951e-03", "color": {"color": "#555555", "opacity": 0.92}, "dashes": false, "arrows": {"to": {"enabled": true, "scaleFactor": 0.48}}}, {"from": "prep_3", "to": "temp_4", "_norm_w": 0.17904869239747867, "width": 2.02, "title": "Valor: 8.865e-04", "color": {"color": "#555555", "opacity": 0.444}, "dashes": false, "arrows": {"to": {"enabled": true, "scaleFactor": 0.48}}}, {"from": "CNT_TRF", "to": "VAL_CRIT_APOYO", "_norm_w": 0.17779727380958762, "width": 2.01, "title": "Valor: 8.803e-04", "color": {"color": "#555555", "opacity": 0.443}, "dashes": false, "arrows": {"to": {"enabled": true, "scaleFactor": 0.48}}}, {"from": "wind_spd_7", "to": "wind_spd_4", "_norm_w": 0.1678716023133034, "width": 1.93, "title": "Valor: 8.312e-04", "color": {"color": "#555555", "opacity": 0.437}, "dashes": false, "arrows": {"to": {"enabled": true, "scaleFactor": 0.48}}}, {"from": "CONDUCTOR", "to": "wind_spd_6", "_norm_w": 0.1674630602863763, "width": 1.92, "title": "Valor: 8.292e-04", "color": {"color": "#555555", "opacity": 0.437}, "dashes": false, "arrows": {"to": {"enabled": true, "scaleFactor": 0.48}}}]};
    const container = document.getElementById('net_top_frecuencia_periodo');

    if (typeof vis === 'undefined') {
      container.innerHTML = `
        <div style="margin:24px;padding:20px;border:1px solid #d1dce8;border-radius:8px;
                    background:#f8fafc;color:#3d5166;font-family:system-ui,sans-serif;">
          <b style="font-size:14px;">vis-network no disponible</b>
          <p style="margin-top:8px;font-size:12px;line-height:1.6;">
            Abre este archivo en un navegador con acceso a internet.
          </p>
        </div>`;
      return;
    }

    var nodes = new vis.DataSet(
      payload.nodes.map(n => {
        const bg = scoreToCSS(n._score);
        return {
          id: n.id, label: n.label, title: n.title,
          size: 16 + 8 * Math.max(0, Math.min(1, n._score)), shape: 'dot',
          color: {
            background: bg,
            border: bg,
            highlight: { background: bg, border: '#2c3e50' },
            hover:     { background: bg, border: '#2c3e50' },
          },
          font: {
            size: 14, color: '#000000',
            face: "'Segoe UI', system-ui, sans-serif",
            strokeWidth: 0,
          },
          borderWidth: 1,
          borderWidthSelected: 3,
        };
      })
    );

    var edges = new vis.DataSet(
      payload.edges.map(e => ({
        from: e.from, to: e.to,
        width: e.width, title: e.title,
        color: e.color, dashes: e.dashes,
        arrows: e.arrows,
        smooth: { type: 'dynamic' },
      }))
    );

    // --- Resaltado de vecindad (click) ---
    const origColors = {};
    const origLabels = {};
    nodes.get().forEach(n => { origColors[n.id] = n.color; origLabels[n.id] = n.label; });
    let highlightActive = false;

    function resetHighlight() {
      nodes.update(nodes.get().map(n => ({
        id: n.id, color: origColors[n.id], label: origLabels[n.id],
      })));
      highlightActive = false;
    }

    function applyHighlight(selId) {
      const conn = new Set(network.getConnectedNodes(selId));
      nodes.update(nodes.get().map(n => {
        const fade = n.id !== selId && !conn.has(n.id);
        return {
          id: n.id,
          color: fade
            ? { background:'rgba(210,222,234,0.38)', border:'rgba(180,200,220,0.42)' }
            : origColors[n.id],
          label: fade ? undefined : origLabels[n.id],
        };
      }));
      highlightActive = true;
    }

    // --- F&iacute;sica con inercia (barnesHut, amortiguaci&oacute;n baja) ---
    const options = {
      physics: {
        enabled: true,
        solver: 'barnesHut',
        barnesHut: {
          gravitationalConstant: -2000,
          centralGravity: 0.1,
          springLength: 150,
          springConstant: 0.05,
          damping: 0.9,
          avoidOverlap: 0.12,
        },
        stabilization: { enabled: true, fit: true, iterations: 550, updateInterval: 30 },
      },
      interaction: {
        hover: true, tooltipDelay: 60,
        navigationButtons: false,
        keyboard: { enabled: false, bindToWindow: false },
        zoomView: true, dragNodes: true,
      },
      nodes: { shape: 'dot' },
      edges: {
        smooth: { type: 'dynamic' },
        hoverWidth: w => w + 1,
        selectionWidth: w => w + 2,
      },
    };

    const network = new vis.Network(container, { nodes, edges }, options);

    network.on('click', params => {
      if (params.nodes.length > 0) {
        applyHighlight(params.nodes[0]);
      } else if (highlightActive) {
        resetHighlight();
      }
    });

    network.once('stabilizationIterationsDone', () => {
      network.fit({ animation: { duration: 500, easingFunction: 'easeInOutQuad' } });
      // Reducir fuerzas pero mantener f&iacute;sica activa → inercia al arrastrar
      network.setOptions({
        physics: {
          barnesHut: {
            gravitationalConstant: -2000,
            springConstant: 0.05,
            damping: 0.9,
          }
        }
      });
    });
  })();
  </script>
</body>
</html>
