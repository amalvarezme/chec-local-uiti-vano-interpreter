<body>
  <div class="layout">

  <script>
  (() => {
    function lerpRGB(a, b, t) {
      return [
        Math.round(a[0] + t * (b[0] - a[0])),
        Math.round(a[1] + t * (b[1] - a[1])),
        Math.round(a[2] + t * (b[2] - a[2])),
      ];
    }
    const CS = [[69,117,180],[255,255,191],[215,48,39]];
    function scoreToCSS(t) {
      t = Math.max(0, Math.min(1, t));
      const rgb = t <= 0.5 ? lerpRGB(CS[0], CS[1], t * 2) : lerpRGB(CS[1], CS[2], (t - 0.5) * 2);
      return `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
    }

    const payload = {"nodes": [{"id": "CNT_TRF", "label": "CNT_TRF", "_score": 1.0, "mode_id": "A", "mode_name": "Evento, impacto e indicadores", "title": "CNT_TRF\nRelevancia: 1.000e+00"}, {"id": "TIPO", "label": "TIPO", "_score": 0.932757875917389, "mode_id": "B", "mode_name": "Infraestructura de protección y maniobra", "title": "TIPO\nRelevancia: 9.328e-01"}, {"id": "ALTURA", "label": "ALTURA", "_score": 0.07522186948861807, "mode_id": "E", "mode_name": "Activos: apoyo final y transformador", "title": "ALTURA\nRelevancia: 7.522e-02"}, {"id": "prep_9", "label": "prep_9", "_score": 0.05855297331767963, "mode_id": "F", "mode_name": "Entorno, riesgo y clima", "title": "prep_9\nRelevancia: 5.855e-02"}, {"id": "CNT_VN", "label": "CNT_VN", "_score": 0.058527880257441725, "mode_id": "B", "mode_name": "Infraestructura de protección y maniobra", "title": "CNT_VN\nRelevancia: 5.853e-02"}, {"id": "prep_2", "label": "prep_2", "_score": 0.04682011838164427, "mode_id": "F", "mode_name": "Entorno, riesgo y clima", "title": "prep_2\nRelevancia: 4.682e-02"}, {"id": "prep_1", "label": "prep_1", "_score": 0.04564765891731488, "mode_id": "F", "mode_name": "Entorno, riesgo y clima", "title": "prep_1\nRelevancia: 4.565e-02"}, {"id": "wind_spd_6", "label": "wind_spd_6", "_score": 0.045563596921132134, "mode_id": "F", "mode_name": "Entorno, riesgo y clima", "title": "wind_spd_6\nRelevancia: 4.556e-02"}, {"id": "CONDUCTOR", "label": "CONDUCTOR", "_score": 0.03551258983011329, "mode_id": "D", "mode_name": "Características físicas y eléctricas del vano", "title": "CONDUCTOR\nRelevancia: 3.551e-02"}, {"id": "temp_5", "label": "temp_5", "_score": 0.028083365435753346, "mode_id": "F", "mode_name": "Entorno, riesgo y clima", "title": "temp_5\nRelevancia: 2.808e-02"}, {"id": "temp_7", "label": "temp_7", "_score": 0.024472405292354147, "mode_id": "F", "mode_name": "Entorno, riesgo y clima", "title": "temp_7\nRelevancia: 2.447e-02"}, {"id": "Y2", "label": "Y2", "_score": 0.02009019754974887, "mode_id": "C", "mode_name": "Topología y configuración espacial", "title": "Y2\nRelevancia: 2.009e-02"}, {"id": "wind_gust_spd_6", "label": "wind_gust_spd_6", "_score": 0.018539698994535628, "mode_id": "F", "mode_name": "Entorno, riesgo y clima", "title": "wind_gust_spd_6\nRelevancia: 1.854e-02"}, {"id": "wind_spd_9", "label": "wind_spd_9", "_score": 0.011677387740801196, "mode_id": "F", "mode_name": "Entorno, riesgo y clima", "title": "wind_spd_9\nRelevancia: 1.168e-02"}, {"id": "prep_4", "label": "prep_4", "_score": 0.011030881782329903, "mode_id": "F", "mode_name": "Entorno, riesgo y clima", "title": "prep_4\nRelevancia: 1.103e-02"}, {"id": "wind_spd_0", "label": "wind_spd_0", "_score": 0.009855478165955117, "mode_id": "F", "mode_name": "Entorno, riesgo y clima", "title": "wind_spd_0\nRelevancia: 9.855e-03"}, {"id": "temp_6", "label": "temp_6", "_score": 0.008327852461768998, "mode_id": "F", "mode_name": "Entorno, riesgo y clima", "title": "temp_6\nRelevancia: 8.328e-03"}, {"id": "wind_spd_3", "label": "wind_spd_3", "_score": 0.0036799899638312035, "mode_id": "F", "mode_name": "Entorno, riesgo y clima", "title": "wind_spd_3\nRelevancia: 3.680e-03"}, {"id": "prep_3", "label": "prep_3", "_score": 0.002973182587190423, "mode_id": "F", "mode_name": "Entorno, riesgo y clima", "title": "prep_3\nRelevancia: 2.973e-03"}, {"id": "NG_RED", "label": "NG_RED", "_score": 0.0, "mode_id": "D", "mode_name": "Características físicas y eléctricas del vano", "title": "NG_RED\nRelevancia: 0.000e+00"}], "edges": [{"from": "CNT_VN", "to": "Y2", "_norm_w": 1.0, "width": 9.0, "title": "Valor: 9.998e-01", "color": {"color": "#555555", "opacity": 0.92}, "dashes": false, "arrows": {"to": {"enabled": true, "scaleFactor": 0.48}}}, {"from": "wind_spd_6", "to": "CONDUCTOR", "_norm_w": 0.0008967913448193582, "width": 0.51, "title": "Valor: 8.966e-04", "color": {"color": "#555555", "opacity": 0.341}, "dashes": false, "arrows": {"to": {"enabled": true, "scaleFactor": 0.48}}}, {"from": "prep_1", "to": "wind_spd_6", "_norm_w": 0.0008372450206041397, "width": 0.51, "title": "Valor: 8.371e-04", "color": {"color": "#555555", "opacity": 0.34}, "dashes": false, "arrows": {"to": {"enabled": true, "scaleFactor": 0.48}}}, {"from": "temp_5", "to": "wind_spd_9", "_norm_w": 0.0005405459143158716, "width": 0.5, "title": "Valor: 5.404e-04", "color": {"color": "#555555", "opacity": 0.34}, "dashes": false, "arrows": {"to": {"enabled": true, "scaleFactor": 0.48}}}, {"from": "prep_4", "to": "temp_6", "_norm_w": 0.0004138785895255794, "width": 0.5, "title": "Valor: 4.138e-04", "color": {"color": "#555555", "opacity": 0.34}, "dashes": false, "arrows": {"to": {"enabled": true, "scaleFactor": 0.48}}}]};
    const container = document.getElementById('net_top_uiti_fechas');

    if (typeof vis === 'undefined') {
      container.innerHTML = `
        <div style="margin:24px;padding:20px;border:1px solid #d1dce8;border-radius:8px;
                    background:#f8fafc;color:#3d5166;font-family:system-ui,sans-serif;">
          <b style="font-size:14px;">vis-network no disponible</b>
          <p style="margin-top:8px;font-size:12px;line-height:1.6;">
            Abre este archivo en un navegador con acceso a internet.
          </p>
        </div>`;
      return;
    }

    var nodes = new vis.DataSet(
      payload.nodes.map(n => {
        const bg = scoreToCSS(n._score);
        return {
          id: n.id, label: n.label, title: n.title,
          size: 16 + 8 * Math.max(0, Math.min(1, n._score)), shape: 'dot',
          color: {
            background: bg,
            border: bg,
            highlight: { background: bg, border: '#2c3e50' },
            hover:     { background: bg, border: '#2c3e50' },
          },
          font: {
            size: 14, color: '#000000',
            face: "'Segoe UI', system-ui, sans-serif",
            strokeWidth: 0,
          },
          borderWidth: 1,
          borderWidthSelected: 3,
        };
      })
    );

    var edges = new vis.DataSet(
      payload.edges.map(e => ({
        from: e.from, to: e.to,
        width: e.width, title: e.title,
        color: e.color, dashes: e.dashes,
        arrows: e.arrows,
        smooth: { type: 'dynamic' },
      }))
    );

    // --- Resaltado de vecindad (click) ---
    const origColors = {};
    const origLabels = {};
    nodes.get().forEach(n => { origColors[n.id] = n.color; origLabels[n.id] = n.label; });
    let highlightActive = false;

    function resetHighlight() {
      nodes.update(nodes.get().map(n => ({
        id: n.id, color: origColors[n.id], label: origLabels[n.id],
      })));
      highlightActive = false;
    }

    function applyHighlight(selId) {
      const conn = new Set(network.getConnectedNodes(selId));
      nodes.update(nodes.get().map(n => {
        const fade = n.id !== selId && !conn.has(n.id);
        return {
          id: n.id,
          color: fade
            ? { background:'rgba(210,222,234,0.38)', border:'rgba(180,200,220,0.42)' }
            : origColors[n.id],
          label: fade ? undefined : origLabels[n.id],
        };
      }));
      highlightActive = true;
    }

    // --- F&iacute;sica con inercia (barnesHut, amortiguaci&oacute;n baja) ---
    const options = {
      physics: {
        enabled: true,
        solver: 'barnesHut',
        barnesHut: {
          gravitationalConstant: -2000,
          centralGravity: 0.1,
          springLength: 150,
          springConstant: 0.05,
          damping: 0.9,
          avoidOverlap: 0.12,
        },
        stabilization: { enabled: true, fit: true, iterations: 550, updateInterval: 30 },
      },
      interaction: {
        hover: true, tooltipDelay: 60,
        navigationButtons: false,
        keyboard: { enabled: false, bindToWindow: false },
        zoomView: true, dragNodes: true,
      },
      nodes: { shape: 'dot' },
      edges: {
        smooth: { type: 'dynamic' },
        hoverWidth: w => w + 1,
        selectionWidth: w => w + 2,
      },
    };

    const network = new vis.Network(container, { nodes, edges }, options);

    network.on('click', params => {
      if (params.nodes.length > 0) {
        applyHighlight(params.nodes[0]);
      } else if (highlightActive) {
        resetHighlight();
      }
    });

    network.once('stabilizationIterationsDone', () => {
      network.fit({ animation: { duration: 500, easingFunction: 'easeInOutQuad' } });
      // Reducir fuerzas pero mantener f&iacute;sica activa → inercia al arrastrar
      network.setOptions({
        physics: {
          barnesHut: {
            gravitationalConstant: -2000,
            springConstant: 0.05,
            damping: 0.9,
          }
        }
      });
    });
  })();
  </script>
</body>
